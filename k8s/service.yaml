apiVersion: v1
kind: Service
metadata:
  name: invest-ai-backend
  namespace: invest-ai
  labels:
    app.kubernetes.io/name: invest-ai
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: invest-ai
    app.kubernetes.io/component: backend
  type: ClusterIP   # Ingress handles external access; change to LoadBalancer if no Ingress controller
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
